<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Trading Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { background:#0d1117; color:#fff; font-family:sans-serif; margin:0; }
.container { max-width:420px; margin:auto; padding:10px; }
.card { background:#161b22; padding:12px; border-radius:10px; margin-bottom:10px; }
input,select,button {
    width:100%; padding:10px; margin:5px 0;
    border:none; border-radius:8px;
    background:#0d1117; color:#fff;
}
button { background:#238636; }
.buy{color:#00ff9f;} .sell{color:#ff4d4d;}
#chart { height:300px; }
</style>
</head>

<body>

<div class="container">

<h2>📊 Smart Trading Dashboard</h2>

<div class="card">
<input id="symbolInput" placeholder="Enter Symbol (BTCUSDT, SHIBUSDT, GOLD, AAPL)">
<button onclick="loadChart()">Load Chart</button>
</div>

<div id="chart"></div>

<div class="card">
<h3>📊 Logic Input</h3>

<select id="day">
<option value="up">Day Cross Up</option>
<option value="down">Day Cross Down</option>
</select>

<select id="h4">
<option value="up">4H Cross Up</option>
<option value="down">4H Cross Down</option>
<option value="divup">4H Divergence Up</option>
<option value="divdown">4H Divergence Down</option>
</select>

<select id="h1">
<option value="up">1H Cross Up</option>
<option value="down">1H Cross Down</option>
<option value="divup">1H Divergence Up</option>
<option value="divdown">1H Divergence Down</option>
</select>

<button onclick="analyze()">Analyze</button>
</div>

<div class="card" id="result">Waiting...</div>

<div class="card">
<h3>📡 Live Price</h3>
<div id="price">-</div>
</div>

</div>

<script>

let currentSymbol = "BTCUSDT";

// ===== LOAD CHART =====
function loadChart(){
    let input = document.getElementById("symbolInput").value.toUpperCase();
    if(input) currentSymbol = input;

    document.getElementById("chart").innerHTML = "";

    let tvSymbol = currentSymbol;

    // Try to map crypto
    if(currentSymbol.endsWith("USDT")){
        tvSymbol = "BINANCE:" + currentSymbol;
    }

    new TradingView.widget({
        container_id: "chart",
        symbol: tvSymbol,
        interval: "60",
        theme: "dark",
        width: "100%",
        height: 300
    });
}

// ===== LOGIC =====
function analyze(){

let d = day.value;
let h4v = h4.value;
let h1v = h1.value;

let result = "❌ NO TRADE";
let color = "";

// BUY
if(d==="up" && h4v==="up" && h1v==="up"){
    result="🟢 STRONG BUY"; color="buy";
}
else if(d==="up" && h4v==="down" && h1v==="divup"){
    result="🟢 PULLBACK BUY"; color="buy";
}
else if(d==="down" && h4v==="divup" && h1v==="up"){
    result="🟢 REVERSAL BUY"; color="buy";
}

// SELL
else if(d==="down" && h4v==="down" && h1v==="down"){
    result="🔴 STRONG SELL"; color="sell";
}
else if(d==="down" && h4v==="up" && h1v==="divdown"){
    result="🔴 PULLBACK SELL"; color="sell";
}
else if(d==="up" && h4v==="divdown" && h1v==="down"){
    result="🔴 REVERSAL SELL"; color="sell";
}

document.getElementById("result").innerHTML =
`<span class="${color}">${result}</span>`;
}

// ===== PRICE FETCH (CRYPTO ONLY) =====
async function fetchPrice(){
    try{
        if(currentSymbol.endsWith("USDT")){
            let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
            let data = await res.json();
            price.innerText = "Price: " + data.price;
        }else{
            price.innerText = "Live price not supported for this asset";
        }
    }catch{
        price.innerText = "API Error";
    }
}

setInterval(fetchPrice,3000);

loadChart();

</script>

</body>
</html>
